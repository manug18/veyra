spring:
  datasource:
    url: jdbc:h2:mem:veyradb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

server:
  port: 8080

jwt:
  secret: VeyraInventorySecretKey2026ThisMustBeAtLeast256BitsLongForHS256Algorithm!
  expiration: 86400000   # 24 hours in ms

cors:
  allowed-origin: http://localhost:4200
