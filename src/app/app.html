<div class="app-shell container-fluid px-0">
  <header class="app-header bg-white shadow-sm" *ngIf="auth.isLoggedIn()">
    <div class="header-inner">
      <div class="brand">
        <span class="app-title">&#9634; Inventory Management</span>
      </div>
      <nav class="app-nav">
        <ng-container *ngIf="auth.isAdmin()">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Dashboard</a>
          <a routerLink="/variants" routerLinkActive="active" class="nav-link">Variants</a>
          <a routerLink="/inventory" routerLinkActive="active" class="nav-link">Inventory</a>
          <a routerLink="/orders" routerLinkActive="active" class="nav-link">Orders</a>
          <a routerLink="/customers" routerLinkActive="active" class="nav-link">Customers</a>
        </ng-container>
        <ng-container *ngIf="!auth.isAdmin()">
          <a routerLink="/variants" routerLinkActive="active" class="nav-link">Variants</a>
        </ng-container>
      </nav>
      <div class="nav-user">
        <span class="user-label">{{ auth.getUsername() }}</span>
        <span class="user-role badge" [class.bg-primary]="auth.isAdmin()" [class.bg-secondary]="!auth.isAdmin()">
          {{ auth.isAdmin() ? 'Admin' : 'Viewer' }}
        </span>
        <button class="btn btn-sm btn-outline-secondary ms-2" type="button" (click)="logout()">Logout</button>
      </div>
    </div>
  </header>

  <main class="app-content container py-4">
    <router-outlet></router-outlet>
  </main>
</div>
